version: "3.8"
services:

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    networks: 
      - todo-app
    volumes:
      - mongo-data:/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    networks: 
      - todo-app
    depends_on:
      - mongo
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks: 
      - todo-app
    depends_on:
      - backend

networks:
  todo-app:
    driver: bridge
volumes:
  mongo-data:
